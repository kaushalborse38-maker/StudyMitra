<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDYMITRA | Advanced AI Exam Analysis</title>

    <link rel="icon" type="image/png" href="logo.png">

    <!-- Tailwind + Chart -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="glass-nav fixed top-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <h1 class="text-2xl font-bold">StudyMitra</h1>
    </div>
</header>

<!-- UPLOAD -->
<main id="upload-page" class="pt-40 px-6 max-w-5xl mx-auto">

    <div id="dropzone" class="dropzone">
        <input type="file" id="file-input" multiple accept=".pdf" hidden>
        <h2>Drop PDF here</h2>
        <button onclick="document.getElementById('file-input').click()">Browse</button>
    </div>

    <div id="file-list" class="hidden">
        <h3>Files</h3>
        <div id="files-container"></div>
        <button id="analyze-btn">Analyze</button>
    </div>

    <div id="error-message" class="hidden"></div>

</main>

<!-- LOADING -->
<div id="loading-screen" class="hidden">
    <h2>Analyzing...</h2>
</div>

<!-- DASHBOARD -->
<main id="dashboard" class="hidden px-6">
    <h1>Dashboard</h1>

    <canvas id="frequencyChart"></canvas>
    <canvas id="difficultyChart"></canvas>

    <div id="plan-table-body"></div>
</main>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
